<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1C1C1E" />
  <title>Forge</title>

  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Premium animated mood buttons (STATE 2 on exercise cards). Loaded after
       styles.css so these rules win for the redesigned pill look. -->
  <style>
    .card-moods-row {
      display: flex;
      gap: 6px;
      width: 100%;
      justify-content: space-between;
    }

    /* Tall rounded pill */
    .mood-btn {
      position: relative;
      flex: 1;
      min-width: 0;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 4px;
      background: #111;
      border: 2px solid var(--glow);
      border-radius: 16px;
      cursor: pointer;
      overflow: visible;
      box-shadow: 0 0 12px rgba(var(--glow-rgb), 0.6);
      animation: moodBreathe 2s ease-in-out infinite alternate;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    /* Per-mood glow colours */
    .mood-btn--crushed   { --glow: #FFB800; --glow-rgb: 255, 184, 0; }
    .mood-btn--good      { --glow: #3B82F6; --glow-rgb: 59, 130, 246; }
    .mood-btn--steady    { --glow: #00BFA5; --glow-rgb: 0, 191, 165; }
    .mood-btn--struggled { --glow: #E8611A; --glow-rgb: 232, 97, 26; }
    .mood-btn--attempted { --glow: #7C6FCD; --glow-rgb: 124, 111, 205; }

    /* Staggered breathe so the glow ripples across the row */
    .mood-btn:nth-child(1) { animation-delay: 0s; }
    .mood-btn:nth-child(2) { animation-delay: 0.4s; }
    .mood-btn:nth-child(3) { animation-delay: 0.8s; }
    .mood-btn:nth-child(4) { animation-delay: 1.2s; }
    .mood-btn:nth-child(5) { animation-delay: 1.6s; }

    @keyframes moodBreathe {
      from { box-shadow: 0 0 12px rgba(var(--glow-rgb), 0.6); }
      to   { box-shadow: 0 0 12px rgba(var(--glow-rgb), 1); }
    }

    /* Icon (upper portion) — no circle backing in the new design */
    .mood-btn-circle {
      width: auto;
      height: auto;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      animation: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mood-btn-circle svg { width: 28px; height: 28px; color: var(--glow); }

    .mood-btn-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--glow);
      opacity: 1;
      text-align: center;
      line-height: 1.1;
    }

    /* Hover / tap — pause the breathe so the glow can explode */
    .mood-btn:hover,
    .mood-btn:active {
      animation: none;
      transform: scale(1.12);
      box-shadow: 0 0 24px rgba(var(--glow-rgb), 1);
    }
    .mood-btn:active .mood-btn-circle { transform: none; } /* override old icon spring */

    /* Selected state */
    .mood-btn.is-selected {
      animation: none;
      transform: scale(1.08);
      background: rgba(var(--glow-rgb), 0.25);
      border-color: var(--glow);
      box-shadow: 0 0 24px rgba(var(--glow-rgb), 1);
    }
    .mood-btn--attempted .mood-btn-circle,
    .mood-btn.is-selected .mood-btn-circle,
    .mood-btn--attempted.is-selected .mood-btn-circle {
      background: transparent;
      border: 0;
      box-shadow: none;
    }
    .mood-btn.is-selected .mood-btn-circle svg { color: var(--glow); }
    .mood-btn.is-selected .mood-btn-label { color: var(--glow); opacity: 1; }

    /* One-shot halo ring on tap */
    .mood-btn.tapped::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      border: 2px solid var(--glow);
      pointer-events: none;
      animation: moodHalo 0.5s ease-out forwards;
    }
    .mood-btn.tapped .mood-btn-circle { animation: none; }
    @keyframes moodHalo {
      from { transform: scale(1); opacity: 0.9; }
      to   { transform: scale(1.6); opacity: 0; }
    }

    /* Completed card — dim the unchosen pills and stop their breathe */
    .mood-btn:disabled { cursor: default; }
    .mood-btn:disabled:not(.is-selected) { animation: none; opacity: 0.4; }
    .card-nontimed .mood-btn:disabled:not(.is-selected) { opacity: 0.3; }

    /* CHECK FORM button — strip the legacy round-icon look (no circle, no
       border, no fixed box) and render as a small plain pill. Keeps the
       margin-left nudge + pulsing burnt-orange glow. */
    .card-info-btn {
      margin-left: 8px;
      width: auto;
      height: auto;
      border: none;
      border-radius: 6px;
      background: none;
      padding: 2px 6px;
      font-style: normal;
      font-size: 10px;
      letter-spacing: 0.04em;
      line-height: 1.2;
      white-space: nowrap;
      animation: checkFormBreathe 2s ease-in-out infinite alternate;
    }
    @keyframes checkFormBreathe {
      from { box-shadow: 0 0 6px rgba(232, 97, 26, 0.6); }
      to   { box-shadow: 0 0 14px rgba(232, 97, 26, 1); }
    }

    /* "ALL DONE TODAY!" banner — animated flexing-arm icon (replaces 💪). */
    .day-icon-flex {
      display: inline-block;
      vertical-align: middle;
      margin-left: 6px;
      filter: drop-shadow(0 0 6px #FFB800);
      animation: flexPulse 0.8s ease-in-out infinite;
    }
    @keyframes flexPulse {
      0%, 100% { filter: drop-shadow(0 0 4px #FFB800); transform: scale(1); }
      50% { filter: drop-shadow(0 0 10px #FFB800); transform: scale(1.2); }
    }

    /* Plan screen — animated Friday flame + Saturday moon icons. */
    .day-icon-flame { display: inline-block; vertical-align: middle; margin-left: 6px; filter: drop-shadow(0 0 4px #FF6B00); }
    .day-icon-moon { display: inline-block; vertical-align: middle; margin-left: 6px; filter: drop-shadow(0 0 4px #B8C4E8); animation: moonPulse 3s ease-in-out infinite; }
    @keyframes moonPulse {
      0%, 100% { filter: drop-shadow(0 0 4px #B8C4E8); }
      50% { filter: drop-shadow(0 0 10px #B8C4E8); }
    }

    /* Breathing orange glow on primary orange action buttons + Plan exercise
       pills. Colours/sizes/behaviour unchanged — only the box-shadow animates. */
    @keyframes btnBreathe {
      from { box-shadow: 0 0 8px rgba(232, 97, 26, 0.5); }
      to   { box-shadow: 0 0 18px rgba(232, 97, 26, 0.9); }
    }
    .btn-forge:not(.btn-spin--used),
    .card-start,
    .btn-log,
    .pl-pill:not(.pl-pill--rest) {
      animation: btnBreathe 2s ease-in-out infinite alternate;
    }

    /* Plank in-card timer — countdown (training days) / count-up (Best Effort).
       Dark centred display with an SVG progress ring + drifting embers behind
       a big Bebas Neue burnt-orange number. */
    .plank-timer {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px 0 6px;
      overflow: hidden;
    }
    .plank-embers {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .plank-ring-wrap {
      position: relative;
      z-index: 1;
      width: 150px;
      height: 150px;
    }
    .plank-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg); /* start the arc at 12 o'clock */
    }
    .plank-ring-bg { fill: none; stroke: rgba(255, 255, 255, 0.08); stroke-width: 5; }
    .plank-ring-fg {
      fill: none;
      stroke: #E8611A;
      stroke-width: 5;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px rgba(232, 97, 26, 0.85));
      transition: stroke-dashoffset 1s linear;
    }
    .plank-time {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #E8611A;
      text-shadow: 0 0 16px rgba(232, 97, 26, 0.6);
    }
    .plank-stop {
      position: relative;
      z-index: 1;
      background: none;
      border: 1.5px solid rgba(232, 97, 26, 0.7);
      border-radius: 10px;
      color: #E8611A;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease;
    }
    .plank-stop:active { transform: scale(0.96); }

    /* Notifications screen + the Settings "Push Notifications" nav card
       (OneSignal push opt-in). Reuses the .set-card look. */
    .set-nav-card {
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      cursor: pointer;
      text-align: left;
      font: inherit;
      color: inherit;
    }
    .set-nav-text { display: flex; flex-direction: column; gap: 2px; }
    .set-nav-chevron { width: 18px; height: 18px; flex: none; color: #E8611A; }
    .set-nav-card:active { transform: scale(0.99); }

    .notif-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .notif-list li {
      position: relative;
      padding-left: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--cream);
      opacity: 0.85;
      line-height: 1.35;
    }
    .notif-list li::before { content: '🔥'; position: absolute; left: 0; top: 0; }

    .notif-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .notif-actions[hidden] { display: none; }

    .notif-status {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 1px;
      text-align: center;
      margin: 0;
    }
    .notif-status:empty { display: none; }
    .notif-status.is-on { color: #27AE60; text-shadow: 0 0 12px rgba(39, 174, 96, 0.5); }
  </style>

  <!-- OneSignal Web Push SDK (v16) -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: '74707ec9-2d2d-4fb3-aad5-e73e6b7aca59',
      });
    });
  </script>
</head>
<body>
  <!-- ===================== LOGIN / USER SELECTION ===================== -->
  <main id="login-screen" class="screen">
    <header class="brand">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Built together. Day by day.</p>
      <p class="brand-version">v1.0.53</p>
    </header>

    <!-- Motivational quote (random, filled in by scripts.js) -->
    <p id="login-quote" class="login-quote"></p>

    <!-- Rolodex-style horizontal carousel (cards injected by scripts.js) — swipe to navigate. -->
    <section id="login-carousel" class="carousel" aria-label="Select a user">
      <div id="carousel" class="carousel-track" role="listbox" tabindex="0">
        <!-- User cards injected by scripts.js -->
      </div>
    </section>

    <button id="forge-btn" class="btn-forge" type="button">Let's Forge</button>

    <!-- Developer-only shortcuts; shown by scripts.js when DEV_MODE is true -->
    <button id="dev-login-btn" class="dev-login hidden" type="button">Dev Login</button>
    <button id="dev-friday-btn" class="dev-login hidden" type="button">Dev - Friday Mode</button>

    <p id="login-message" class="message" role="status" aria-live="polite"></p>
    <p id="login-junk" class="junk-note hidden">Can't find it? Check your junk or spam folder.</p>

    <!-- Discreet install link at the bottom; hidden by scripts.js when the app is
         already running as an installed PWA. -->
    <button id="install-btn" class="install-link" type="button">Install app</button>
  </main>

  <!-- Face ID enrolment + other auth screens are rendered dynamically by
       scripts.js (see showEnableFaceId). There is no registration screen —
       the squad admin adds users to the Firestore users collection. -->

  <!-- ===================== DASHBOARD (placeholder) ===================== -->
  <main id="dashboard-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
    </header>
    <div class="dashboard">
      <p class="dashboard-greeting">Welcome, <span id="dashboard-user-name">Forger</span></p>
      <p class="dashboard-placeholder">Dashboard coming soon</p>
      <button type="button" id="sign-out-btn" class="btn-link">Sign out</button>
    </div>
  </main>

  <!-- Onboarding (cards rendered by scripts.js: renderOnboarding) -->
  <main id="onboarding-screen" class="screen hidden"></main>

  <!-- Admin panel (Mark only; rendered by scripts.js: openAdmin) -->
  <main id="admin-screen" class="screen hidden"></main>

  <!-- Forge Card (coming soon; rendered by scripts.js: openForgeCard) -->
  <main id="forgecard-screen" class="screen hidden"></main>

  <!-- Daily motivation pop-up (filled + toggled by scripts.js: showDailyQuotePopup) -->
  <div id="daily-quote-overlay" class="quote-overlay hidden" role="dialog" aria-modal="true"></div>

  <!-- Bonus spin full-screen experience (filled + toggled by scripts.js: openSpin) -->
  <div id="spin-overlay" class="spin-overlay hidden" role="dialog" aria-modal="true"></div>

  <!-- Post-workout mood photo (camera prompt + lightbox; rendered by scripts.js) -->
  <div id="camera-overlay" class="cam-overlay hidden" role="dialog" aria-modal="true"></div>
  <div id="photo-lightbox" class="lightbox-overlay hidden" role="dialog" aria-modal="true"></div>

  <!-- Firebase SDK (compat) — Firestore + Storage; Authentication is no longer used -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- Chart.js (progress graphs) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- App config + logic -->
  <script src="js/config.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
