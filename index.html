<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1C1C1E" />
  <title>Forge</title>

  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===================== LOGIN / USER SELECTION ===================== -->
  <main id="login-screen" class="screen">
    <header class="brand">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Built together. Day by day.</p>
      <p class="brand-version">v0.2.10</p>
    </header>

    <!-- Motivational quote (random, filled in by scripts.js) -->
    <p id="login-quote" class="login-quote"></p>

    <!-- Rolodex-style horizontal carousel (cards injected by scripts.js) -->
    <section class="carousel" aria-label="Select a user">
      <button id="carousel-prev" class="carousel-arrow carousel-arrow--left" type="button" aria-label="Previous user">‹</button>
      <div id="carousel" class="carousel-track" role="listbox" tabindex="0">
        <!-- User cards injected by scripts.js -->
      </div>
      <button id="carousel-next" class="carousel-arrow carousel-arrow--right" type="button" aria-label="Next user">›</button>
    </section>

    <button id="forge-btn" class="btn-forge" type="button">Let's Forge</button>

    <!-- Developer-only shortcut; shown by scripts.js when DEV_MODE is true -->
    <button id="dev-login-btn" class="dev-login hidden" type="button">Dev Login</button>

    <p id="login-message" class="message" role="status" aria-live="polite"></p>
  </main>

  <!-- ===================== REGISTER FORM ===================== -->
  <main id="register-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Join the challenge.</p>
    </header>

    <form id="register-form" class="form" novalidate>
      <label class="field">
        <span class="field-label">First name</span>
        <input id="reg-name" name="name" type="text" autocomplete="given-name" placeholder="First name" required />
      </label>

      <label class="field">
        <span class="field-label">Email address</span>
        <input id="reg-email" name="email" type="email" autocomplete="email" required />
      </label>

      <label class="field">
        <span class="field-label">Invite code</span>
        <input id="reg-code" name="code" type="text" autocomplete="off" required />
      </label>

      <button type="submit" class="btn-forge">Create account</button>
      <button type="button" id="register-back" class="btn-link">Back</button>
      <p id="register-message" class="message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <!-- ===================== EMAIL CONFIRMATION (magic link) ===================== -->
  <main id="confirm-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Almost there.</p>
    </header>
    <div class="confirm-box">
      <p class="confirm-text">Confirm your email address to finish signing in.</p>
      <label class="field">
        <span class="field-label">Email address</span>
        <input id="confirm-email" type="email" autocomplete="email" inputmode="email" />
      </label>
      <button id="confirm-btn" class="btn-forge" type="button">Confirm sign in</button>
      <p id="confirm-message" class="message" role="status" aria-live="polite"></p>
    </div>
  </main>

  <!-- ===================== DASHBOARD (placeholder) ===================== -->
  <main id="dashboard-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
    </header>
    <div class="dashboard">
      <p class="dashboard-greeting">Welcome, <span id="dashboard-user-name">Forger</span></p>
      <p class="dashboard-placeholder">Dashboard coming soon</p>
      <button type="button" id="sign-out-btn" class="btn-link">Sign out</button>
    </div>
  </main>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- App config + logic -->
  <script src="js/config.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
