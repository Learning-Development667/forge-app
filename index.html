<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1C1C1E" />
  <title>Forge</title>

  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===================== LOGIN / USER SELECTION ===================== -->
  <main id="login-screen" class="screen">
    <header class="brand">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Built together. Day by day.</p>
      <p class="brand-version">v0.2.74</p>
    </header>

    <!-- Motivational quote (random, filled in by scripts.js) -->
    <p id="login-quote" class="login-quote"></p>

    <!-- Rolodex-style horizontal carousel (cards injected by scripts.js) — swipe to navigate. -->
    <section id="login-carousel" class="carousel" aria-label="Select a user">
      <div id="carousel" class="carousel-track" role="listbox" tabindex="0">
        <!-- User cards injected by scripts.js -->
      </div>
    </section>

    <button id="forge-btn" class="btn-forge" type="button">Let's Forge</button>

    <!-- Always available: go to the register screen. -->
    <button id="register-link" class="btn-link" type="button">Create account</button>

    <!-- Install instructions button (secondary) -->
    <button id="install-btn" class="btn-outline" type="button">Install App</button>

    <!-- Developer-only shortcuts; shown by scripts.js when DEV_MODE is true -->
    <button id="dev-login-btn" class="dev-login hidden" type="button">Dev Login</button>
    <button id="dev-friday-btn" class="dev-login hidden" type="button">Dev - Friday Mode</button>

    <p id="login-message" class="message" role="status" aria-live="polite"></p>
    <p id="login-junk" class="junk-note hidden">Can't find it? Check your junk or spam folder.</p>
  </main>

  <!-- PIN setup, biometric, returning-user lock and other auth screens are
       rendered dynamically by scripts.js (see buildPinScreen / showLock). -->

  <!-- ===================== REGISTER FORM ===================== -->
  <main id="register-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
      <p class="brand-tagline">Join the challenge.</p>
    </header>

    <form id="register-form" class="form" novalidate>
      <label class="field">
        <span class="field-label">First Name</span>
        <input id="reg-name" name="name" type="text" autocomplete="given-name" placeholder="First Name" required />
      </label>

      <label class="field">
        <span class="field-label">Invite code</span>
        <input id="reg-code" name="code" type="text" autocomplete="off" required />
      </label>

      <button type="submit" class="btn-forge">Register</button>
      <button type="button" id="register-back" class="btn-link">Back</button>
      <p id="register-message" class="message" role="status" aria-live="polite"></p>
      <p id="register-junk" class="junk-note hidden"></p>
    </form>
  </main>

  <!-- ===================== DASHBOARD (placeholder) ===================== -->
  <main id="dashboard-screen" class="screen hidden">
    <header class="brand brand--compact">
      <h1 class="brand-name">FORGE</h1>
    </header>
    <div class="dashboard">
      <p class="dashboard-greeting">Welcome, <span id="dashboard-user-name">Forger</span></p>
      <p class="dashboard-placeholder">Dashboard coming soon</p>
      <button type="button" id="sign-out-btn" class="btn-link">Sign out</button>
    </div>
  </main>

  <!-- Firebase SDK (compat) — Firestore only; Authentication is no longer used -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <!-- Chart.js (progress graphs) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- App config + logic -->
  <script src="js/config.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
